spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/looky?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&createDatabaseIfNotExist=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true # 쿼리 가독성 향상

  flyway:
    enabled: true
    baseline-on-migrate: true # JPA가 먼저 생성한 스키마를 Flyway가 baseline으로 인식
    locations:
      - classpath:db/seed # 시드 데이터만 실행 (DDL 마이그레이션 제외)

  # [dev 배포 전 Flyway 마이그레이션 로컬 검증 방법]
  # 새 마이그레이션 스크립트(db/migration/V?.sql)를 작성한 뒤, dev 서버 배포 전에 아래 설정으로 임시 교체하여 로컬에서 먼저 검증한다.
  # 검증 후에는 반드시 원래 설정으로 되돌릴 것.
  #
  # flyway:
  #   enabled: true
  #   baseline-on-migrate: true
  #   locations:
  #     - classpath:db/migration # DDL 마이그레이션 포함하여 검증
  #     - classpath:db/seed
  # jpa:
  #   hibernate:
  #     ddl-auto: validate # Flyway가 스키마를 관리하므로 validate로 전환

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile,email
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope: profile_nickname,account_email
            client-name: Kakao
          apple:
            client-id: ${APPLE_SERVICE_ID}
            client-secret: "TEMP_SECRET" # 자바 코드에서 동적으로 만들어 넣을 거라 임시로 채워둠
            redirect-uri: "http://localhost:8080/login/oauth2/code/apple"
            authorization-grant-type: authorization_code
            scope: name,email
            client-name: Apple
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub

# 애플 로그인용 커스텀 설정
apple:
  team-id: ${APPLE_TEAM_ID}
  key-id: ${APPLE_KEY_ID}
  client-id: ${APPLE_SERVICE_ID}
  private-key-path: classpath:key/AuthKey_75MYRHH88K.p8