name: Dev Deploy Workflow

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/looky-backend:dev

      - name: EC2 Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: ENV_FILE
          script: |
            echo "$ENV_FILE" | base64 -d > .env.dev

            sudo docker network create looky-net || true
            sudo docker volume create looky-dev-db-data || true

            if ! sudo docker ps -a --format '{{.Names}}' | grep -q '^looky-db$'; then
              sudo docker run -d --name looky-db \
                --network looky-net \
                -e MYSQL_ROOT_PASSWORD=0000 \
                -e MYSQL_DATABASE=looky_dev \
                -v looky-dev-db-data:/var/lib/mysql \
                --restart unless-stopped \
                mysql:8.0
            else
              sudo docker start looky-db || true
            fi

            until sudo docker exec looky-db sh -c 'mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent'; do
              echo "Waiting for looky-db to be ready..."
              sleep 5
            done

            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/looky-backend:dev

            sudo docker stop looky-dev || true
            sudo docker rm looky-dev || true

            sudo docker run -d --name looky-dev \
              --network looky-net \
              -p 127.0.0.1:8081:8080 \
              --env-file .env.dev \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/looky-backend:dev

            echo "Spring Boot 헬스체크 시작..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/health)
              if [ "$STATUS" = "200" ]; then
                echo "서버 정상 기동 확인 (시도: $i)"
                break
              fi
              echo "대기 중... ($i/12) status=$STATUS"
              sleep 5
              if [ "$i" = "12" ]; then
                echo "서버 기동 실패 - 헬스체크 타임아웃"
                sudo docker logs looky-dev --tail 50
                exit 1
              fi
            done
            
            rm -f .env.dev

            sudo docker image prune -f
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
